# Донгл работает как Central (главный)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# Виртуальная матрица для полной клавиатуры
CONFIG_ZMK_MATRIX_TRANSFORM=y

# Батарея и уровень заряда
CONFIG_ZMK_BATTERY_REPORTING=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Усиленный сигнал (опционально, для длинного кабеля USB)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Имя в Bluetooth
CONFIG_BT_DEVICE_NAME="Jorne Dongle"
